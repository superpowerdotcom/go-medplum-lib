name: go-medplum-lib - Pull Request

on: pull_request

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
    - name: Set up Go
      uses: actions/setup-go@v2.1.3
      with:
        go-version: '~1.22'

    - uses: actions/checkout@main

    - name: Configure Git for private repository access
      env:
        PAT_TOKEN: ${{ secrets.CI_PAT_TOKEN_READONLY }}
      run: |
        git config --global url."https://${PAT_TOKEN}@github.com/".insteadOf "https://github.com/"

    - name: Test
      run: go test ./... -v
