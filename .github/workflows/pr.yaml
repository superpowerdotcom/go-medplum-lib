name: go-medplum-lib - Pull Request

on: pull_request

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
    - name: Set up Go
      uses: actions/setup-go@v2.1.3
      with:
        go-version: '~1.22'

    - uses: actions/checkout@main

    - name: Set up Go private modules
      run: |
        git config --global url."https://${{ secrets.GITHUB_TOKEN }}:x-oauth-basic@github.com/".insteadOf "https://github.com/"
        echo "GOPRIVATE=github.com/superpowerdotcom/fhir" >> $GITHUB_ENV

    - name: Test
      run: go test ./... -v
