name: Tests

on:
  pull_request:
    branches: [main]
  workflow_call:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: 'go.mod'

      - name: Configure Git for private repository access
        env:
          PAT_TOKEN: ${{ secrets.CI_PAT_TOKEN_READONLY }}
        run: |
          git config --global url."https://${PAT_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Run tests
        run: go test -v ./...
