name: go-medplum - Staging Release

on:
  workflow_dispatch:
    inputs:
      prerelease_type:
        description: 'Pre-release type'
        required: true
        default: 'beta'
        type: choice
        options:
        - beta
        - alpha
        - rc
      version_increment:
        description: 'Version increment'
        required: true
        default: 'patch'
        type: choice
        options:
        - patch
        - minor
        - major

jobs:
  test:
    uses: ./.github/workflows/test.yml
    secrets: inherit

  staging-release:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get_latest_tag
        run: |
          git fetch --tags
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=$LATEST_TAG" >> $GITHUB_OUTPUT
          echo "Latest tag: $LATEST_TAG"

      - name: Calculate next version
        id: next_version
        run: |
          LATEST_TAG=${{ steps.get_latest_tag.outputs.latest_tag }}
          VERSION_INCREMENT=${{ inputs.version_increment }}
          PRERELEASE_TYPE=${{ inputs.prerelease_type }}
          
          # Remove 'v' prefix if present
          VERSION=${LATEST_TAG#v}
          
          # Split version into major, minor, patch
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"
          
          # Remove any existing pre-release suffix from patch
          PATCH=${PATCH%%-*}
          
          # Increment version based on input
          case $VERSION_INCREMENT in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac
          
          # Generate timestamp for uniqueness
          TIMESTAMP=$(date +%Y%m%d%H%M%S)
          
          # Create new pre-release version
          NEW_VERSION="v${MAJOR}.${MINOR}.${PATCH}-${PRERELEASE_TYPE}.${TIMESTAMP}"
          
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "Next version: $NEW_VERSION"

      - name: Create staging tag
        run: |
          NEW_VERSION=${{ steps.next_version.outputs.new_version }}
          git config user.name github-actions
          git config user.email github-actions@github.com
          git tag -a $NEW_VERSION -m "Staging release $NEW_VERSION"
          git push origin $NEW_VERSION

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.next_version.outputs.new_version }}
          release_name: Staging Release ${{ steps.next_version.outputs.new_version }}
          body: |
            🧪 **Staging Release**
            
            This is a pre-release version for testing purposes.
            
            **Changes:**
            - Branch: `${{ github.ref_name }}`
            - Commit: `${{ github.sha }}`
            - Pre-release type: `${{ inputs.prerelease_type }}`
            - Version increment: `${{ inputs.version_increment }}`
            
            **Usage:**
            ```bash
            go get github.com/superpowerdotcom/go-medplum-lib@${{ steps.next_version.outputs.new_version }}
            ```
            
            ⚠️ **Note:** This is a staging release and should not be used in production.
          draft: false
          prerelease: true

      - name: Summary
        run: |
          echo "## 🎉 Staging Release Created!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** \`${{ steps.next_version.outputs.new_version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** \`${{ github.ref_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Type:** \`${{ inputs.prerelease_type }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Usage in other projects:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`bash" >> $GITHUB_STEP_SUMMARY
          echo "go get github.com/superpowerdotcom/go-medplum-lib@${{ steps.next_version.outputs.new_version }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY